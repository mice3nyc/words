<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>words</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/niceplugin/Paperlogy/fonts/css/Paperlogy.min.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font: 'Paperlogy', 'Pretendard', -apple-system, sans-serif;
    --black: #111;
    --grey: #888;
    --light: #e0e0e0;
    --accent: #d44;
    --bg: #fff;
    --max-w: 1200px;
    --read-w: 640px;
  }

  body {
    font-family: var(--font);
    color: var(--black);
    background: var(--bg);
    line-height: 1.75;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    padding: 3rem 2rem 2rem;
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .site-title {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    cursor: pointer;
    color: var(--black);
    text-decoration: none;
  }

  .site-title:hover { color: var(--accent); }

  .header-nav {
    font-size: 0.8rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  /* ── List View ── */
  .list-view {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 2rem;
  }

  .post-item {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--light);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .post-item:hover { opacity: 0.6; }

  .post-item:last-child { border-bottom: none; }

  .post-title {
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 0.3rem;
  }

  .post-subtitle {
    font-size: 0.85rem;
    color: var(--grey);
    margin-bottom: 0.3rem;
  }

  .post-date {
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  /* ── Post View ── */
  .post-view {
    display: none;
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .post-header {
    max-width: var(--read-w);
    margin: 0 auto 2.5rem;
  }

  .post-header h2 {
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 0.4rem;
  }

  .post-header .subtitle {
    font-size: 0.9rem;
    color: var(--grey);
    margin-bottom: 0.5rem;
  }

  .post-header .date {
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  .back-link {
    display: inline-block;
    margin-bottom: 2rem;
    font-size: 0.8rem;
    color: var(--grey);
    text-decoration: none;
    cursor: pointer;
    letter-spacing: 0.03em;
  }

  .back-link:hover { color: var(--accent); }

  /* ── Bilingual Layout ── */
  .bilingual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    max-width: var(--max-w);
    margin: 0 auto;
  }

  .bilingual.vertical {
    grid-template-columns: 1fr;
    max-width: var(--read-w);
  }

  .bilingual.vertical .col-en {
    border-top: 1px solid var(--light);
    padding-top: 2rem;
    margin-top: 1rem;
  }

  .col-kr, .col-en {
    font-size: 0.95rem;
    line-height: 1.85;
  }

  .col-en {
    color: #444;
  }

  .col-kr p, .col-en p {
    margin-bottom: 1.2rem;
  }

  .col-kr strong, .col-en strong {
    font-weight: 600;
  }

  .col-kr img, .col-en img {
    max-width: 100%;
    margin: 1rem 0;
    border-radius: 2px;
  }

  .lang-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--grey);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  /* ── Flip Button ── */
  .flip-btn {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    width: 40px;
    height: 40px;
    border: 1.5px solid var(--light);
    border-radius: 50%;
    background: var(--bg);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 100;
  }

  .flip-btn:hover {
    border-color: var(--accent);
  }

  .flip-btn svg {
    width: 16px;
    height: 16px;
    stroke: var(--grey);
    fill: none;
    stroke-width: 1.5;
    transition: all 0.2s;
  }

  .flip-btn:hover svg {
    stroke: var(--accent);
  }

  .flip-btn.is-vertical svg {
    transform: rotate(90deg);
  }

  /* ── Footer ── */
  footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 3rem 2rem;
    font-size: 0.7rem;
    color: var(--light);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    header { padding: 2rem 1.2rem 1.5rem; }
    .list-view { padding: 1rem 1.2rem; }
    .post-view { padding: 0 1.2rem 3rem; }
    .bilingual {
      grid-template-columns: 1fr;
      max-width: var(--read-w);
    }
    .bilingual .col-en {
      border-top: 1px solid var(--light);
      padding-top: 2rem;
      margin-top: 1rem;
    }
  }
</style>
</head>
<body>

<header>
  <a class="site-title" onclick="showList()">words</a>
  <span class="header-nav">피터공의 글</span>
</header>

<!-- List View -->
<main class="list-view" id="listView"></main>

<!-- Post View -->
<article class="post-view" id="postView">
  <a class="back-link" onclick="showList()">← 목록</a>
  <div class="post-header" id="postHeader"></div>
  <div class="bilingual" id="bilingualContent"></div>
</article>

<!-- Flip Button -->
<button class="flip-btn" id="flipBtn" title="레이아웃 전환" onclick="toggleLayout()">
  <svg viewBox="0 0 24 24">
    <line x1="3" y1="12" x2="21" y2="12"/>
    <line x1="12" y1="3" x2="12" y2="21"/>
  </svg>
</button>

<footer>words — Matter of Peter on Play</footer>

<script>
// ── Data ──
const POSTS = [
  {
    id: "001",
    title: "문구록:연필.",
    subtitle: "文具論 01. 연필에 대해 기록하다 (2016)",
    date: "2016-05-05",
    visible: true,
    content_kr: `연필은 필기구 중에서 필기감이 가장 좋다. 사각거리는 적절한 마찰감과 부드러움이 동시에 담긴 흑연의 필기감은 개인적으로는 필기도구 중 최고라 생각된다. 물론 흑연 종류에 따라 그 필기감과 색감이 다르기 때문에 연필 모두를 하나로 퉁치는 것은 무리.

연필의 필기의 유일한 단점은 필기후 번진다는 것인데 H 숫자가 높아지면 번짐은 줄어든다 그런데 색이 흐려지고 필기감도 너무 거칠어 져서 필기의 만족도가 극감소 한다. B류가 좋기는 한데 숫자가 높아질수록 너무 부드럽고 잘 번진다. 아마 HB나 B가 가장 흔히 쓰이는 이유가 그 때문이 아닐까 하는데.

오늘은 몇가지 집에 굴러다니는 6개의 연필류를 비교해 보았다.

**1) Rotring 600 샤프펜슬 0.5mm HB**

현재 심이 HB인지 아닌지는 잘 모르겠다. 제도용 샤프라고 하는 것 같은데 그 조형미와 무게감이 쵝오다. 물론 그래서 일반 샤프보다는 좀 비싸다. 검정색을 많이 쓰는데 나는 메탈색감이 좋아서 현재 600은색을 쓰고 있다.

사실 Rotring600은 연필보다 '정서적' 필기감이 떨어진다 생각되어 소장용에 가까웠다. 그런데 모처럼 써보니 필기감이 꽤 좋다. 샤프심이 너무 부드러웠는데 그건 심 종류를 테스트 해보면 해결 될 듯 하다. 단지 일정폭으로 필기가 되어 연필보다 필기하는 맛이 덜하다는 것이 가장 큰 약점!

**2) 문화 더존 B 컴퓨터용**

문방구에서 흔히 파는 제품이다. 디자인도 그런 모양새이다. 두툼하게 써지는 맛이 좋고 적절한 마찰감이 좋다. 컴퓨터 용이라 되어있는데 일반과 차이가 뭔지는 잘 모르겠다. 단점이라면 역시 B 계열이라서 인지 연필이 빨리 닳는다.

**3) Staedtler Yellow pencil 134-2B**

연필 끝에 분홍색 지우개가 검정 메탈 틀로 고정되어있는 달걀노른자색의 몸체. 서양 연필의 클래식한 전통적 모습을 간직한 멋진 연필이다. 살짝 거친듯한 필기감도 일품! 이번 테스트에서는 가장 마음에 드는 녀석이다.

**4) Dixon HB**

역시 전통적인 느낌의 연필. HB가 생각보다 많이 거칠었고 흐려서 필기하는 맛이 별로 였다.

**5) 동아연필 B**

초등생용 연필이다. 느낌인지는 모르겠지만, 컴퓨터용 B보다 진하고 거친 느낌이다. 디자인이 인상적인데... 초딩정서인 나도 감당하기 힘든 초딩디자인 감각으로 과도 포장되어있다.

**6) Faber-Castell 어린이 연필**

흑연이 뭔지 표기가 안되어 있는데 실제 사용해 보면 B정도 인듯하다.

소포지 위에 쓰면서 비교했는데 Dixon HB를 빼고는 그냥 보기에는 비슷하다. 하지만, 손맛은 전혀 달랐다는 것이 중요하다. 특히 Rotring의 필기감은 아주 만족스러웠지만, 사실 연필 필기의 아름다움은 필기중간에 연필을 깍아 줘야 한다는데 있다고 하겠다.

연필은 필기 뿐 아니라 연필을 깍는 아름다운 육체적 경험이 함께 한다! 마치 선비가 붓을 들어 먹물을 적시듯, 연필의 간지는 연필을 깍는 행위라 할 수 있겠다.

그래서 휴대용 연필 깍이가 매우 중요한데 이 또한 선택이 쉽지 않다. 필자는 현재 Muji의 휴대용 사각연필깍이를 사용중인데, 크기를 제외한 모든 부분이 사실 좀 불만스러운 제품이다.

말이 나온 김에, 다음 시간에는 연필깍이 이야기를 해 볼까 한다.`,
    content_en: `Among writing instruments, the pencil offers the finest writing feel. The graphite's perfect balance of friction and smoothness — that gentle scratching sensation — makes it, in my personal opinion, the supreme writing tool. Of course, since different types of graphite produce different textures and tones, it would be unfair to lump all pencils together.

The only drawback of pencil writing is smudging. Higher H numbers reduce smudging, but the lines become faint and the friction too harsh, dramatically killing the satisfaction. B-grades are nice, but the higher the number, the softer and smudgier they get. Perhaps that's why HB and B are the most commonly used.

Today I compared six pencils I found lying around the house.

**1) Rotring 600 Mechanical Pencil 0.5mm HB**

I'm not even sure what grade the current lead is. It's supposedly a drafting pencil, and its form and heft are superb. Naturally, it costs more than a regular mechanical pencil. Most people go for black, but I prefer the metallic finish — I'm using the silver 600.

Honestly, I'd kept the Rotring 600 more as a collector's item, thinking its "emotional" writing feel fell short of a real pencil. But trying it again after a long while, the feel is quite good. The lead was too soft, but that's fixable by testing different grades. The biggest weakness remains that the uniform stroke width robs it of a pencil's character.

**2) Munhwa Deojon B Computer-Use**

The kind you find at any stationery shop. The design looks the part. There's a satisfying thickness to each stroke and a pleasant friction. It says "computer use" but I have no idea how it differs from the regular version. The downside — being B-grade, the pencil wears down fast.

**3) Staedtler Yellow Pencil 134-2B**

A pink eraser capped in a black metal ferrule atop an egg-yolk yellow body. A beautiful pencil that preserves the classic Western tradition. The slightly rough writing feel is exquisite! My favorite from this test.

**4) Dixon HB**

Another pencil with a traditional feel. The HB turned out rougher and fainter than expected — not much pleasure in writing with it.

**5) Dong-A Pencil B**

An elementary school pencil. Maybe it's just me, but it feels darker and rougher than the computer-use B. The design is... remarkable — wrapped in a kiddie aesthetic so intense that even I, with my own childlike sensibilities, find it overwhelming.

**6) Faber-Castell Children's Pencil**

No graphite grade marked, but in practice it seems about B.

I compared them writing on rough craft paper. Apart from the Dixon HB, they look similar at a glance. But the hand-feel was entirely different — and that's what matters. The Rotring's writing feel was deeply satisfying, yet the true beauty of pencil writing lies in having to sharpen the pencil mid-sentence.

A pencil isn't just about writing — it comes with the beautiful physical ritual of sharpening! Like a scholar lifting a brush to wet it with ink, the pencil's elegance lives in the act of sharpening.

Which makes portable sharpeners critically important — and not easy to choose. I'm currently using a Muji portable square sharpener, and apart from its size, I'm honestly dissatisfied with everything about it.

Since we're on the topic, next time let's talk about pencil sharpeners.`
  },
  {
    id: "002",
    title: "누구나 할 수 있다면, 누구인가가 중요하다.",
    subtitle: "",
    date: "2023-06-27",
    visible: true,
    content_kr: `아이가 태어나자마자 이름을 짓는다. 왜일까. 사실 그 아이는 아직 아무것도 아니다. 아무 것도 해본 적이 없고, 아무 것도 되어본 적이 없다. 그런데도 이름을 짓는다. 이름이 필요하기 때문이다.

이름은 존재의 선언이다. "너는 여기에 있다"는 선언. 아이에게 이름을 주는 순간, 우리는 그 아이가 세상에 자기 자리가 있다고 말해주는 것이다.

요리를 예로 들어보자. 누구나 요리를 할 수 있다. 레시피를 따라하면 비슷한 결과가 나온다. 하지만 같은 레시피로 만들어도, 어떤 사람이 만든 음식은 다르다. 그 차이는 기술이 아니라 태도에서 온다. 재료를 고를 때의 눈, 불 조절의 감각, 간을 보는 순간의 판단 — 이 모든 것이 그 사람의 경험과 감성에서 나온다.

AI 시대에 이 질문은 더 날카로워진다. AI도 글을 쓸 수 있고, 그림을 그릴 수 있고, 코드를 짤 수 있다. 누구나 할 수 있는 것이 아니라, 이제는 무엇이든 할 수 있는 시대다.

그렇다면 남는 것은 무엇인가. 누구인가.

같은 프롬프트를 입력해도, 그것을 어떤 맥락에서 물었는지, 결과를 어떻게 고르는지, 무엇을 버리고 무엇을 살리는지 — 그것이 '누구'를 드러낸다.

결국, 누구나 할 수 있다면 — 누구인가가 중요하다.`,
    content_en: `The moment a child is born, we give them a name. Why? In truth, that child is nothing yet. They've done nothing, been nothing. And still, we name them. Because a name is needed.

A name is a declaration of existence. A declaration that says, "you are here." The moment we give a child a name, we are telling them they have a place in this world.

Take cooking, for example. Anyone can cook. Follow a recipe and you'll get similar results. But even with the same recipe, certain people's food tastes different. That difference comes not from skill but from attitude. The eye for choosing ingredients, the intuition for adjusting heat, the judgment when tasting for seasoning — all of it springs from that person's experience and sensibility.

In the age of AI, this question cuts even sharper. AI can write, paint, and code. It's no longer that anyone can do these things — now anything can be done.

So what remains? Who.

Even with the same prompt, the context in which you asked it, how you choose among the results, what you discard and what you keep — that is what reveals the "who."

In the end, if anyone can do it — then who you are is what matters.`
  }
];

// ── State ──
let isVertical = window.innerWidth <= 768;
let currentPost = null;

// ── Render ──
function renderList() {
  const el = document.getElementById('listView');
  const visible = POSTS.filter(p => p.visible);
  el.innerHTML = visible.map(p => `
    <div class="post-item" onclick="showPost('${p.id}')">
      <div class="post-title">${p.title}</div>
      ${p.subtitle ? `<div class="post-subtitle">${p.subtitle}</div>` : ''}
      <div class="post-date">${p.date}</div>
    </div>
  `).join('');
}

function renderPost(post) {
  document.getElementById('postHeader').innerHTML = `
    <h2>${post.title}</h2>
    ${post.subtitle ? `<div class="subtitle">${post.subtitle}</div>` : ''}
    <div class="date">${post.date}</div>
  `;

  const krHtml = paragraphs(post.content_kr);
  const enHtml = paragraphs(post.content_en);

  document.getElementById('bilingualContent').innerHTML = `
    <div class="col-kr">
      <div class="lang-label">한국어</div>
      ${krHtml}
    </div>
    <div class="col-en">
      <div class="lang-label">English</div>
      ${enHtml}
    </div>
  `;

  updateLayout();
}

function paragraphs(text) {
  return text.trim().split('\n\n').map(p => {
    p = p.trim();
    if (p.startsWith('**') && p.endsWith('**')) {
      return `<p><strong>${p.slice(2, -2)}</strong></p>`;
    }
    p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    return `<p>${p}</p>`;
  }).join('');
}

// ── Navigation ──
function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('postView').style.display = 'none';
  document.getElementById('flipBtn').style.display = 'none';
  currentPost = null;
  window.scrollTo(0, 0);
}

function showPost(id) {
  const post = POSTS.find(p => p.id === id);
  if (!post) return;
  currentPost = post;
  renderPost(post);
  document.getElementById('listView').style.display = 'none';
  document.getElementById('postView').style.display = 'block';
  document.getElementById('flipBtn').style.display = 'flex';
  window.scrollTo(0, 0);
}

// ── Layout Toggle ──
function toggleLayout() {
  isVertical = !isVertical;
  updateLayout();
}

function updateLayout() {
  const el = document.getElementById('bilingualContent');
  const btn = document.getElementById('flipBtn');
  if (isVertical) {
    el.classList.add('vertical');
    btn.classList.add('is-vertical');
    btn.title = '좌우 배치로 전환';
  } else {
    el.classList.remove('vertical');
    btn.classList.remove('is-vertical');
    btn.title = '상하 배치로 전환';
  }
}

// ── Init ──
renderList();

window.addEventListener('resize', () => {
  if (window.innerWidth <= 768 && !isVertical) {
    isVertical = true;
    if (currentPost) updateLayout();
  }
});
</script>

</body>
</html>
