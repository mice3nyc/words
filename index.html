<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>words</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/subsets/Paperlogy-dynamic-subset.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --font: 'Paperlogy', 'Pretendard', -apple-system, sans-serif;
    --black: #111;
    --grey: #888;
    --light: #e0e0e0;
    --accent: #d44;
    --bg: #fff;
    --max-w: 1200px;
    --read-w: 640px;
  }

  body {
    font-family: var(--font);
    color: var(--black);
    background: var(--bg);
    line-height: 1.75;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    padding: 3rem 2rem 2rem;
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .site-title {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    cursor: pointer;
    color: var(--black);
    text-decoration: none;
  }

  .site-title:hover { color: var(--accent); }

  .header-nav {
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  /* ── List View ── */
  .list-view {
    max-width: var(--read-w);
    margin: 0 auto;
    padding: 2rem;
  }

  .post-item {
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--light);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .post-item:hover { opacity: 0.6; }

  .post-item:last-child { border-bottom: none; }

  .post-title {
    font-size: 1.15rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 0.2rem;
  }

  .post-title-en {
    font-size: 0.8rem;
    color: var(--grey);
    font-weight: 400;
    margin-bottom: 0.3rem;
  }

  .post-subtitle {
    font-size: 0.85rem;
    color: var(--grey);
    margin-bottom: 0.3rem;
  }

  .post-date {
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  /* ── Post View ── */
  .post-view {
    display: none;
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 2rem 4rem;
  }

  .post-header {
    max-width: var(--read-w);
    margin: 0 auto 2.5rem;
  }

  .post-header h2 {
    font-size: 1.6rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 0.2rem;
  }

  .post-header .title-en {
    font-size: 0.95rem;
    color: var(--grey);
    font-weight: 400;
    margin-bottom: 0.5rem;
  }

  .post-header .subtitle {
    font-size: 0.9rem;
    color: var(--grey);
    margin-bottom: 0.5rem;
  }

  .post-header .date {
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 0.05em;
  }

  .post-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    max-width: var(--read-w);
    margin-left: auto;
    margin-right: auto;
    font-size: 0.75rem;
    color: var(--grey);
  }

  .post-nav a {
    color: var(--grey);
    text-decoration: none;
    cursor: pointer;
    letter-spacing: 0.03em;
  }

  .post-nav a:hover { color: var(--accent); }

  .post-nav .nav-disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  /* ── Bilingual Layout ── */
  .bilingual {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
    max-width: var(--max-w);
    margin: 0 auto;
  }

  .bilingual.vertical {
    grid-template-columns: 1fr;
    max-width: var(--read-w);
  }

  .bilingual.vertical .col-en {
    border-top: 1px solid var(--light);
    padding-top: 2rem;
    margin-top: 1rem;
  }

  .col-kr, .col-en {
    font-size: 0.95rem;
    line-height: 1.85;
  }

  .col-en {
    color: #444;
  }

  /* Images: show in left column only (side-by-side), both in stacked */
  .col-en img { display: none; }
  .bilingual.en-first .col-en img { display: block; }
  .bilingual.en-first .col-kr img { display: none; }
  .bilingual.vertical .col-en img { display: block; }
  .bilingual.vertical .col-kr img { display: block; }

  .col-kr h2, .col-en h2 {
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 0.3rem;
  }

  .col-subtitle {
    font-size: 0.85rem;
    color: var(--grey);
    margin-bottom: 0.2rem;
  }

  .col-date {
    font-size: 0.7rem;
    color: var(--grey);
    letter-spacing: 0.05em;
    margin-bottom: 1.5rem;
  }

  .col-kr p, .col-en p {
    margin-bottom: 1.2rem;
  }

  .col-kr strong, .col-en strong {
    font-weight: 600;
  }

  .col-kr img, .col-en img {
    max-width: 100%;
    margin: 1rem 0;
    border-radius: 2px;
  }

  .lang-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--grey);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  /* ── Language Order ── */
  .bilingual.en-first .col-kr { order: 2; }
  .bilingual.en-first .col-en { order: 1; }

  /* ── Control Buttons ── */
  .controls {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 100;
  }

  .ctrl-btn {
    height: 28px;
    padding: 0 0.65rem;
    border: none;
    border-radius: 14px;
    background: var(--grey);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: var(--font);
    font-size: 0.6rem;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.05em;
  }

  .ctrl-btn:hover {
    background: var(--accent);
  }

  /* ── Footer ── */
  footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 3rem 2rem;
    font-size: 0.7rem;
    color: var(--light);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    header { padding: 2rem 1.2rem 1.5rem; }
    .list-view { padding: 1rem 1.2rem; }
    .post-view { padding: 0 1.2rem 3rem; }
    .bilingual {
      grid-template-columns: 1fr;
      max-width: var(--read-w);
    }
    .bilingual .col-en {
      border-top: 1px solid var(--light);
      padding-top: 2rem;
      margin-top: 1rem;
    }
  }
</style>
</head>
<body>

<header>
  <a class="site-title" onclick="showList()">words.of.peter.</a>
  <span class="header-nav">피터공의 글</span>
</header>

<!-- List View -->
<main class="list-view" id="listView"></main>

<!-- Post View -->
<article class="post-view" id="postView">
  <div class="post-nav" id="postNav"></div>
  <div class="post-header" id="postHeader"></div>
  <div class="bilingual" id="bilingualContent"></div>
</article>

<!-- Controls -->
<div class="controls" id="controls">
  <button class="ctrl-btn" id="langBtn" title="언어 순서 전환" onclick="toggleLang()">
    <span id="langLabel">ko → en</span>
  </button>
  <button class="ctrl-btn" id="flipBtn" title="레이아웃 전환" onclick="toggleLayout()">
    <span id="flipLabel">↔</span>
  </button>
</div>

<footer>words of peter — 피터공의 글</footer>

<script>
// ── Data (loaded from JSON) ──
let POSTS = [];
let currentPost = null;
let isVertical = window.innerWidth <= 768;
let isEnFirst = false;

// ── Init ──
fetch('posts.json')
  .then(r => r.json())
  .then(data => {
    POSTS = data.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList();
  });



// ── Render ──
function renderList() {
  const el = document.getElementById('listView');
  const visible = POSTS.filter(p => p.visible);
  el.innerHTML = visible.map(p => `
    <div class="post-item" onclick="showPost('${p.id}')">
      <div class="post-title">${p.title}</div>
      ${p.title_en ? `<div class="post-title-en">${p.title_en}</div>` : ''}
      <div class="post-date">${p.date}</div>
    </div>
  `).join('');
}

function renderPost(post) {
  document.getElementById('postHeader').innerHTML = '';

  const krHtml = paragraphs(post.content_kr);
  const enHtml = paragraphs(post.content_en);

  document.getElementById('bilingualContent').innerHTML = `
    <div class="col-kr">
      <h2>${post.title}</h2>
      ${post.subtitle ? `<div class="col-subtitle">${post.subtitle}</div>` : ''}
      <div class="col-date">${post.date}</div>
      ${krHtml}
    </div>
    <div class="col-en">
      <h2>${post.title_en || post.title}</h2>
      ${post.subtitle_en || post.subtitle ? `<div class="col-subtitle">${post.subtitle_en || post.subtitle}</div>` : ''}
      <div class="col-date">${post.date}</div>
      ${enHtml}
    </div>
  `;

  updateLayout();
}

function paragraphs(text) {
  if (!text) return '<p></p>';
  return text.trim().split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    // Skip horizontal rules
    if (p === '---' || p === '- - -') return '';
    // Image
    const imgMatch = p.match(/^!\[([^\]]*)\]\(([^)]+)\)/);
    if (imgMatch) {
      return `<img src="${imgMatch[2]}" alt="${imgMatch[1]}">`;
    }
    // Bold-only paragraph
    if (p.startsWith('**') && p.endsWith('**')) {
      return `<p><strong>${p.slice(2, -2)}</strong></p>`;
    }
    // Inline bold + images within text
    p = p.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    p = p.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
    return `<p>${p}</p>`;
  }).join('');
}

// ── Navigation ──
function showList() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('postView').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  currentPost = null;
  window.scrollTo(0, 0);
}

function showPost(id) {
  fetch(`posts/${id}.json`)
    .then(r => r.json())
    .then(post => {
      currentPost = post;
      renderPost(post);
      renderNav(id);
      document.getElementById('listView').style.display = 'none';
      document.getElementById('postView').style.display = 'block';
      document.getElementById('controls').style.display = 'flex';
      window.scrollTo(0, 0);
    });
}

function renderNav(currentId) {
  const visible = POSTS.filter(p => p.visible);
  const idx = visible.findIndex(p => p.id === currentId);
  const prev = idx > 0 ? visible[idx - 1] : null;
  const next = idx < visible.length - 1 ? visible[idx + 1] : null;

  document.getElementById('postNav').innerHTML = `
    ${prev ? `<a onclick="showPost('${prev.id}')">← prev</a>` : '<span></span>'}
    <a onclick="showList()">index</a>
    ${next ? `<a onclick="showPost('${next.id}')">next →</a>` : '<span></span>'}
  `;
}

// ── Layout Toggle ──
function toggleLayout() {
  isVertical = !isVertical;
  updateLayout();
}

function toggleLang() {
  isEnFirst = !isEnFirst;
  updateLayout();
}

function updateLayout() {
  const el = document.getElementById('bilingualContent');
  const flipLabel = document.getElementById('flipLabel');
  const langLabel = document.getElementById('langLabel');

  if (isVertical) {
    el.classList.add('vertical');
    flipLabel.textContent = '↕';
  } else {
    el.classList.remove('vertical');
    flipLabel.textContent = '↔';
  }

  if (isEnFirst) {
    el.classList.add('en-first');
    langLabel.textContent = 'en → ko';
  } else {
    el.classList.remove('en-first');
    langLabel.textContent = 'ko → en';
  }
}

window.addEventListener('resize', () => {
  if (window.innerWidth <= 768 && !isVertical) {
    isVertical = true;
    if (currentPost) updateLayout();
  }
});
</script>

</body>
</html>
